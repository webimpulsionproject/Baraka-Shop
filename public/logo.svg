<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Baraka Shop">
  <defs>
    <clipPath id="lozenge">
      <polygon points="50,3 97,50 50,97 3,50"/>
    </clipPath>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>
  <!-- Fond blanc pour lisibilité -->
  <polygon points="50,3 97,50 50,97 3,50" fill="white" filter="url(#shadow)"/>
  <!-- Zone verte haut-gauche — Épicerie -->
  <polygon points="50,3 3,50 50,50" fill="#2E7D32" clip-path="url(#lozenge)"/>
  <!-- Zone orange haut-droit — Traiteur -->
  <polygon points="50,3 97,50 50,50" fill="#E64A19" clip-path="url(#lozenge)"/>
  <!-- Zone rouge bas — Boucherie -->
  <polygon points="3,50 50,97 97,50 50,50" fill="#C62828" clip-path="url(#lozenge)"/>
  <!-- Séparateurs blancs -->
  <line x1="50" y1="3" x2="50" y2="50" stroke="white" stroke-width="1.2" opacity="0.5" clip-path="url(#lozenge)"/>
  <line x1="3" y1="50" x2="97" y2="50" stroke="white" stroke-width="0.8" opacity="0.3" clip-path="url(#lozenge)"/>
  <!-- Bocal épicerie — zone verte ~(25,30) -->
  <g clip-path="url(#lozenge)" fill="white" opacity="0.92">
    <rect x="19" y="25" width="13" height="17" rx="2.5"/>
    <rect x="18" y="22" width="15" height="4" rx="2"/>
    <circle cx="23" cy="31" r="1.4" fill="#2E7D32"/>
    <circle cx="27" cy="35" r="1.4" fill="#2E7D32"/>
    <circle cx="25" cy="39" r="1.1" fill="#2E7D32"/>
  </g>
  <!-- Toque cuisinier — zone orange ~(75,28) -->
  <g clip-path="url(#lozenge)" fill="white" opacity="0.92">
    <ellipse cx="74" cy="27" rx="10" ry="8"/>
    <rect x="64" y="33" width="20" height="5" rx="1.5"/>
    <ellipse cx="74" cy="21" rx="5.5" ry="4.5"/>
  </g>
  <!-- Couteaux croisés — zone rouge ~(50,72) -->
  <g clip-path="url(#lozenge)" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.92">
    <line x1="37" y1="59" x2="58" y2="84"/>
    <rect x="34" y="56" width="6" height="4" rx="1.5" fill="white" stroke="none"/>
    <line x1="63" y1="59" x2="42" y2="84"/>
    <rect x="60" y="56" width="6" height="4" rx="1.5" fill="white" stroke="none"/>
  </g>
  <!-- Bordure losange -->
  <polygon points="50,3 97,50 50,97 3,50" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>
</svg>
